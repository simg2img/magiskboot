name: Build magiskboot for Linux (all architectures)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
    - uses: actions/checkout@v4
      with:
        repository: topjohnwu/Magisk

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        sudo apt-get update
        sudo apt-get install -y ninja-build

    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d
        link-to-sdk: true

    - name: Build magiskboot for ${{ matrix.arch }}
      run: |
        export ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle
        python build.py -r magiskboot -t ${{ matrix.arch }}

    - name: Upload ${{ matrix.arch }}
      uses: actions/upload-artifact@v4
      with:
        name: magiskboot-linux-${{ matrix.arch }}
        path: out/magiskboot-${{ matrix.arch }}
