name: Build magiskboot

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        repository: topjohnwu/Magisk
        ref: master
        submodules: true
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - run: sudo apt-get update && sudo apt-get install -y ninja-build
    - run: python build.py ndk
    - run: python build.py native
    - uses: actions/upload-artifact@v4
      with:
        name: magiskboot-armeabi-v7a
        path: out/native/armeabi-v7a/magiskboot
    - uses: actions/upload-artifact@v4
      with:
        name: magiskboot-arm64-v8a
        path: out/native/arm64-v8a/magiskboot
    - uses: actions/upload-artifact@v4
      with:
        name: magiskboot-x86
        path: out/native/x86/magiskboot
    - uses: actions/upload-artifact@v4
      with:
        name: magiskboot-x86_64
        path: out/native/x86_64/magiskboot
